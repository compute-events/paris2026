<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Glow layer -->
  <path d="M50,2 L57.1,42.9 L98,50 L57.1,57.1 L50,98 L42.9,57.1 L2,50 L42.9,42.9 Z"
        fill="#E07535" filter="url(#glow)">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3.5s" repeatCount="indefinite"/>
  </path>

  <!-- Main star -->
  <path d="M50,2 L57.1,42.9 L98,50 L57.1,57.1 L50,98 L42.9,57.1 L2,50 L42.9,42.9 Z">
    <animate attributeName="fill" values="#E07535;#FFB060;#E07535" dur="3.5s" repeatCount="indefinite"/>
  </path>

  <!-- Inner highlight star -->
  <path d="M50,26 L54.2,45.8 L74,50 L54.2,54.2 L50,74 L45.8,54.2 L26,50 L45.8,45.8 Z"
        fill="#FFD4A8">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.5s" repeatCount="indefinite"/>
  </path>

  <!-- Center dot -->
  <circle cx="50" cy="50" r="4" fill="#FFEEDD">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3.5s" repeatCount="indefinite"/>
  </circle>
</svg>
